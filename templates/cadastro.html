<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Cadastro • Crypto Portfolio</title>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  {% include "partials/header.html" %}

  <main class="max-w-md mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <h1 class="text-2xl font-bold text-white mb-6">Criar conta</h1>

    <!-- Flash Messages -->
    <div class="space-y-2 mb-4" id="flash-container">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="flash-msg rounded-md px-3 py-2 text-sm transition-opacity duration-300
              {% if category == 'error' %} bg-red-900/30 text-red-300 border border-red-800 {% elif category == 'success' %} bg-emerald-900/30 text-emerald-300 border border-emerald-800 {% else %} bg-slate-800 text-slate-200 border border-slate-700 {% endif %}">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}
    </div>

    <form action="/cadastro" method="POST" class="space-y-4">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="space-y-2">
        <label for="email" class="block text-sm text-slate-300">Email</label>
        <input id="email" name="email" type="email" required
          class="w-full rounded-md bg-slate-900 border border-slate-700 text-slate-100 placeholder-slate-400 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="voce@exemplo.com">
      </div>

      <div class="space-y-2">
        <label for="senha" class="block text-sm text-slate-300">Senha</label>
        <input id="senha" name="senha" type="password" required
          class="w-full rounded-md bg-slate-900 border border-slate-700 text-slate-100 placeholder-slate-400 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="••••••••">
      </div>

      <div class="space-y-2">
        <label for="confirmar" class="block text-sm text-slate-300">Confirmar senha</label>
        <input id="confirmar" name="confirmar" type="password" required
          class="w-full rounded-md bg-slate-900 border border-slate-700 text-slate-100 placeholder-slate-400 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="••••••••">
      </div>

      <button type="submit" class="w-full inline-flex justify-center rounded-md bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-2 text-sm font-medium shadow-sm transition-colors">Criar conta</button>
    </form>

    <p class="mt-4 text-sm text-slate-400">Já tem conta? <a href="/login" class="text-indigo-400 hover:text-indigo-300">Entrar</a>.</p>
  </main>
  <script>
    // Auto-dismiss flash messages after 5s
    (function() {
      const flashMsgs = document.querySelectorAll('#flash-container .flash-msg');
      if (flashMsgs.length > 0) {
        setTimeout(() => {
          flashMsgs.forEach(el => {
            el.classList.add('opacity-0');
            setTimeout(() => el.remove(), 300);
          });
        }, 5000);
      }
    })();
  </script>
</body>
</html>

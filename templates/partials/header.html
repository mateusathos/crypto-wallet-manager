<header class="sticky top-0 z-40 bg-slate-950/80 backdrop-blur border-b border-slate-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
            <div class="flex">
                <a href="/" class="flex items-center gap-3">
                    <span class="inline-flex h-8 w-8 items-center justify-center rounded bg-slate-800 text-indigo-400 font-bold">₿</span>
                    <span class="text-white font-semibold tracking-tight">Crypto Wallet Manager</span>
                </a>
                <nav class="flex items-center gap-10 ml-10">
                    <a href="/criptomoedas" class="text-slate-200 hover:text-slate-300 hover:border-b hover:border-white transition-colors {% if request.path == '/criptomoedas' %}font-bold{% endif %}">Criptomoedas</a>
                    <a href="/portfolio" class="text-slate-200 hover:text-slate-300 hover:border-b hover:border-white transition-colors {% if request.path == '/portfolio' %}font-bold{% endif %}">Portfólio</a>
                </nav>
            </div>
            <div class="flex items-center">
                {% if not session.get("user_id") %}
                    <a href="/login" class="inline-flex items-center rounded-md bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-2 text-sm font-medium shadow-sm transition-colors">Entrar</a>
                {% else %}
                    <form method="POST" action="/sair">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                        <button type="submit" class="cursor-pointer inline-flex items-center rounded-md bg-red-600 hover:bg-red-500 text-white px-3 py-2 text-sm font-medium shadow-sm transition-colors">
                            Sair
                        </button>
                    </form>
                {% endif %}
            </div>
        </div>
    </div>
</header>

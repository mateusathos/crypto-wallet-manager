name: Update crypto prices

on:
  schedule:
    - cron: "0 */1 * * *"
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Call price update endpoint
        env:
          CRON_URL: ${{ secrets.CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_URL:-}" ]; then
            echo "CRON_URL secret is missing or empty." >&2
            exit 1
          fi
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "CRON_SECRET secret is missing or empty." >&2
            exit 1
          fi
          status=$(curl -sS -o response.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${CRON_URL}")
          cat response.txt
          test "$status" = "200"
